services:
  businessmap-mcp:
    build: .
    environment:
      - BUSINESSMAP_API_URL=${BUSINESSMAP_API_URL:-https://your-instance.kanbanize.com/api/v2}
      - BUSINESSMAP_API_TOKEN=${BUSINESSMAP_API_TOKEN}
      - BUSINESSMAP_DEFAULT_WORKSPACE_ID=${BUSINESSMAP_DEFAULT_WORKSPACE_ID:-1}
      - BUSINESSMAP_READ_ONLY_MODE=${BUSINESSMAP_READ_ONLY_MODE:-false}
      - MCP_SERVER_NAME=${MCP_SERVER_NAME:-businessmap-mcp}
      - MCP_SERVER_VERSION=${MCP_SERVER_VERSION:-}
      - TRANSPORT=http
      - PORT=${PORT:-3000}
      - HTTP_BODY_LIMIT=${HTTP_BODY_LIMIT:-1mb}
      - HTTP_MAX_SESSIONS=${HTTP_MAX_SESSIONS:-100}
      - HTTP_SESSION_TIMEOUT_MS=${HTTP_SESSION_TIMEOUT_MS:-1800000}
      - LOG_LEVEL=${LOG_LEVEL:-1}
      - LOG_FORMAT=${LOG_FORMAT:-text}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:$${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s